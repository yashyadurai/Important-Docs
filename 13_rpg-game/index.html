<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="outerContainer">
            <div id="mainContainer">
                <div id="upper">
                    <span class="stats">XP: <strong><span id="xpValue">0</span></strong></span>
                    <span class="stats">Health: <strong><span id="healthValue">100</span></strong></span>
                    <span class="stats">Gold: <strong><span id="goldValue">150</span></strong></span>
                </div>

                <div id="buttonsDiv">
                    <button id="goStore">Go to store</button>
                    <button id="goCave">Go to cave</button>
                    <button id="fightDragon">Fight dragon</button>
                </div>

                <div id="textDiv"><p id="text">Welcome to Dragon Repeller. You must defeat the dragon that is preventing people from leaving the town. You are in the town square. Where do you want to go? Use the buttons above.</p></div>
            </div>
        </div>
    </main>
    <script src="scripts.js"></script>
    <footer style="text-align: center; color: grey; background-color: beige; height: 7vh; display: flex; align-items: center; justify-content: center;">
        <p>Created by Yash yadurai</p>
    </footer>
</body>
</html>
