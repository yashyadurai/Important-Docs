<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styles.css">                     
    </head>
    <body>
        <header>
            <h1>Registration Form</h1>
            <p>Please fill out this form with the required information</p>
        </header>
        <form> <!--TODO:Have to add action attrib-->
            <section class="name-email-password">
                <fieldset>
                    <label>Enter Your First Name: <input type="text" id="first-name" class="name-email-password" required></label>
                    <label>Enter Your Last Name: <input type="text" id="last-name" class="name-email-password"></label>
                    <label>Enter Your Email: <input type="email" id="email" class="name-email-password" required></label>
                    <label>Create a New Password: <input type="password" class="name-email-password" required></label>
                </fieldset>
            </section>
            <hr>
            <section class="personal-business">
                <fieldset>
                    <legend>Account type (required)</legend>
                    <input type="radio" id="personal" class="personal-business" name="account-type"><label for="personal"> Personal</label>
                    <input type="radio" id="business" class="personal-business" name="account-type"><label for="business"> Business</label>
                </fieldset>
            </section>
            <hr>
            <section class="profile-age-referrer-bio">
                <fieldset>
                    <legend>Upload a profile picture: </legend>
                    <input type="file" id="profile" class="profile-age-referrer-bio">
                </fieldset>
                <fieldset>
                    <legend>Input your age (years): </legend>
                    <input type="number" max="120" min="13" id="age" class="profile-age-referrer-bio">
                </fieldset>
                <fieldset>
                    <legend>How did you hear about us?</legend>
                    <select>
                        <option value="#">(select one)</option>
                        <option value="1">YouTube</option>
                        <option value="2">LinkedIn</option>
                        <option value="3">FaceBook</option>
                        <option value="4">Instagram</option>
                    </select>
                </fieldset>
                <fieldset>
                    <legend>Provide a bio: </legend>
                    <textarea placeholder="I like coding on the beach..." rows="4" cols="75"></textarea>
                </fieldset>
            </section>
            <hr>
            <section>
                <input type="checkbox" id="terms-condition" required> I accept the <a href="#">terms and conditions</a>
            </section>
            <input type="submit" id="Submit" value="Submit" name="submit">
        </form>
    </body>
</html>
